<svg viewBox="0 0 1180 800" xmlns="http://www.w3.org/2000/svg">
<rect width="1180" height="800" fill="white"/>
<text x="30" y="54" font-size="38" fill="#0D3535" font-style="italic" font-family="Georgia,serif" font-weight="bold">Progressives</text>
<line x1="30" y1="68" x2="234" y2="68" stroke="#0D3535" stroke-width="2.5"/>
<text font-size="9.5" fill="#555" font-style="italic" font-family="Calibri,Arial,sans-serif"><tspan x="30" y="84">Progressives are the biggest believers in comprehensive genomic profiling, regardless of the case or constraints. They</tspan><tspan x="30" dy="13.5">are the most comfortable with prescribing off label treatments, although they do agree that the NCCN guidelines are</tspan><tspan x="30" dy="13.5">generally the correct approach. Due to their specialization, they are often seeing cases where these guidelines may not</tspan><tspan x="30" dy="13.5">apply. They are always seeking the most current treatment information and are highly engaged in the oncology community and</tspan><tspan x="30" dy="13.5">while they are usually directly involved with cancer research, they can be indirectly involved as well. They usually come</tspan><tspan x="30" dy="13.5">from a background of lab research or have a desire to be involved in clinical care.</tspan></text>
<line x1="52" y1="162" x2="52" y2="358" stroke="#AAAAAA" stroke-width="1.2"/><line x1="52" y1="162" x2="57" y2="162" stroke="#AAAAAA" stroke-width="1.2"/><line x1="52" y1="358" x2="57" y2="358" stroke="#AAAAAA" stroke-width="1.2"/>
<line x1="52" y1="396" x2="52" y2="542" stroke="#AAAAAA" stroke-width="1.2"/><line x1="52" y1="396" x2="57" y2="396" stroke="#AAAAAA" stroke-width="1.2"/><line x1="52" y1="542" x2="57" y2="542" stroke="#AAAAAA" stroke-width="1.2"/>
<line x1="52" y1="580" x2="52" y2="694" stroke="#AAAAAA" stroke-width="1.2"/><line x1="52" y1="580" x2="57" y2="580" stroke="#AAAAAA" stroke-width="1.2"/><line x1="52" y1="694" x2="57" y2="694" stroke="#AAAAAA" stroke-width="1.2"/>
<text x="38" y="260" font-size="9.5" fill="#AAAAAA" text-anchor="middle" font-family="Calibri,Arial,sans-serif" transform="rotate(-90 38 260)">Awareness</text>
<text x="38" y="469" font-size="9.5" fill="#AAAAAA" text-anchor="middle" font-family="Calibri,Arial,sans-serif" transform="rotate(-90 38 469)">Patient Constraints</text>
<text x="38" y="637" font-size="9.5" fill="#AAAAAA" text-anchor="middle" font-family="Calibri,Arial,sans-serif" transform="rotate(-90 38 637)">Site Constraints</text>
<rect x="58" y="158" width="556" height="204" rx="3" fill="#5ECAC8" fill-opacity="0.15" stroke="#5ECAC8" stroke-width="1.2"/>
<rect x="610" y="158" width="550" height="204" rx="3" fill="#5ECAC8"/><text x="622" y="174" font-size="10.5" font-weight="bold" fill="#062020" font-family="Calibri,Arial,sans-serif">KEY DIFFERENTIATORS</text><text x="622" y="190.0" font-size="9.8" fill="#062020" font-family="Calibri,Arial,sans-serif">Progressives are the highest in awareness across all the oncologists. They tend to focus</text><text x="622" y="204.0" font-size="9.8" fill="#062020" font-family="Calibri,Arial,sans-serif">their practice to one type of cancer or a rare presentation of cancer and often are</text><text x="622" y="218.0" font-size="9.8" fill="#062020" font-family="Calibri,Arial,sans-serif">responsible for direct cancer research such as clinical trials, but not always.</text><text x="622" y="238.0" font-size="9.8" fill="#062020" font-family="Calibri,Arial,sans-serif">They are actively involved in the community as either thought leaders or contributors to</text><text x="622" y="252.0" font-size="9.8" fill="#062020" font-family="Calibri,Arial,sans-serif">tumor boards, conferences and their peers. These oncologists highly value conversations, both</text><text x="622" y="266.0" font-size="9.8" fill="#062020" font-family="Calibri,Arial,sans-serif">formal and informal, about treatment options with their community and seek them out on a daily</text><text x="622" y="280.0" font-size="9.8" fill="#062020" font-family="Calibri,Arial,sans-serif">basis.</text>
<rect x="58" y="454" width="556" height="92" rx="3" fill="#5ECAC8" fill-opacity="0.15" stroke="#5ECAC8" stroke-width="1.2"/>
<rect x="610" y="454" width="550" height="92" rx="3" fill="#5ECAC8"/><text x="622" y="470" font-size="10.5" font-weight="bold" fill="#062020" font-family="Calibri,Arial,sans-serif">KEY DIFFERENTIATORS</text><text x="622" y="486.0" font-size="9.8" fill="#062020" font-family="Calibri,Arial,sans-serif">While they are most comfortable with off label treatments compared to their peers, they do</text><text x="622" y="500.0" font-size="9.8" fill="#062020" font-family="Calibri,Arial,sans-serif">not consider themselves or these options risky. This is due to the fact that they are more</text><text x="622" y="514.0" font-size="9.8" fill="#062020" font-family="Calibri,Arial,sans-serif">familiar with these options and feel more confident about being able to assess the risks and</text><text x="622" y="528.0" font-size="9.8" fill="#062020" font-family="Calibri,Arial,sans-serif">benefits to the patient based on prior experience or their colleagues’ prior experience.</text>
<text font-size="11" fill="#444" font-family="Calibri,Arial,sans-serif"><tspan x="62" y="189.8">Variety of cancer</tspan><tspan x="62" dy="15.2">type in patient cases</tspan></text>
<text x="248" y="198" font-size="10" fill="#666" text-anchor="end" font-family="Calibri,Arial,sans-serif">Wide</text><text x="492" y="198" font-size="10" fill="#666" font-family="Calibri,Arial,sans-serif">Limited</text>
<rect x="252" y="191" width="235" height="6" rx="3" fill="#CCCCCC"/><circle cx="369.5" cy="194" r="4.2" fill="#38B8B6"/><circle cx="385.9" cy="194" r="4.2" fill="#38B8B6"/><circle cx="402.4" cy="194" r="4.2" fill="#38B8B6"/><circle cx="416.5" cy="194" r="4.2" fill="#38B8B6"/><circle cx="430.6" cy="194" r="4.2" fill="#38B8B6"/><circle cx="447.0" cy="194" r="4.2" fill="#38B8B6"/>
<text font-size="11" fill="#444" font-family="Calibri,Arial,sans-serif"><tspan x="62" y="258.8">Involvement in cancer</tspan><tspan x="62" dy="15.2">research</tspan></text>
<text x="248" y="267" font-size="10" fill="#666" text-anchor="end" font-family="Calibri,Arial,sans-serif">Light</text><text x="492" y="267" font-size="10" fill="#666" font-family="Calibri,Arial,sans-serif">Heavy</text>
<rect x="252" y="260" width="235" height="6" rx="3" fill="#CCCCCC"/><circle cx="435.3" cy="263" r="7.5" fill="#38B8B6"/>
<text font-size="11" fill="#444" font-family="Calibri,Arial,sans-serif"><tspan x="62" y="324.8">Engagement in</tspan><tspan x="62" dy="15.2">oncology community</tspan></text>
<text x="248" y="333" font-size="10" fill="#666" text-anchor="end" font-family="Calibri,Arial,sans-serif">Low</text><text x="492" y="333" font-size="10" fill="#666" font-family="Calibri,Arial,sans-serif">High</text>
<rect x="252" y="326" width="235" height="6" rx="3" fill="#CCCCCC"/><circle cx="444.7" cy="329" r="7.5" fill="#38B8B6"/>
<text font-size="11" fill="#444" font-family="Calibri,Arial,sans-serif"><tspan x="62" y="426.4">Cost sensitivity</tspan></text>
<text x="248" y="427" font-size="10" fill="#666" text-anchor="end" font-family="Calibri,Arial,sans-serif">Low</text><text x="492" y="427" font-size="10" fill="#666" font-family="Calibri,Arial,sans-serif">High</text>
<rect x="252" y="420" width="235" height="6" rx="3" fill="#CCCCCC"/><circle cx="341.3" cy="423" r="7.5" fill="#38B8B6"/>
<text font-size="11" fill="#444" font-family="Calibri,Arial,sans-serif"><tspan x="62" y="488.2">Perceived risk of off</tspan><tspan x="62" dy="15.2">label treatment to</tspan><tspan x="62" dy="15.2">patients</tspan></text>
<text x="248" y="504" font-size="10" fill="#666" text-anchor="end" font-family="Calibri,Arial,sans-serif">Low</text><text x="492" y="504" font-size="10" fill="#666" font-family="Calibri,Arial,sans-serif">High</text>
<rect x="252" y="497" width="235" height="6" rx="3" fill="#CCCCCC"/><circle cx="317.8" cy="500" r="7.5" fill="#38B8B6"/>
<text font-size="11" fill="#444" font-family="Calibri,Arial,sans-serif"><tspan x="62" y="609.4">Cost sensitivity</tspan></text>
<text x="248" y="610" font-size="10" fill="#666" text-anchor="end" font-family="Calibri,Arial,sans-serif">Low</text><text x="492" y="610" font-size="10" fill="#666" font-family="Calibri,Arial,sans-serif">High</text>
<rect x="252" y="603" width="235" height="6" rx="3" fill="#CCCCCC"/><circle cx="350.7" cy="606" r="7.5" fill="#38B8B6"/>
<text font-size="11" fill="#444" font-family="Calibri,Arial,sans-serif"><tspan x="62" y="670.4">Choice in vendor</tspan></text>
<text x="248" y="671" font-size="10" fill="#666" text-anchor="end" font-family="Calibri,Arial,sans-serif">Restricted</text><text x="492" y="671" font-size="10" fill="#666" font-family="Calibri,Arial,sans-serif">Full autonomy</text>
<rect x="252" y="664" width="235" height="6" rx="3" fill="#CCCCCC"/><circle cx="397.7" cy="667" r="7.5" fill="#38B8B6"/>
</svg>