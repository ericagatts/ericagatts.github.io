<svg viewBox="0 0 1180 800" xmlns="http://www.w3.org/2000/svg">
<rect width="1180" height="800" fill="white"/>
<text x="30" y="54" font-size="38" fill="#1A4230" font-style="italic" font-family="Georgia,serif" font-weight="bold">Moderates</text>
<line x1="30" y1="68" x2="183" y2="68" stroke="#1A4230" stroke-width="2.5"/>
<text font-size="9.5" fill="#555" font-style="italic" font-family="Calibri,Arial,sans-serif"><tspan x="30" y="84">Moderates are oncologists that because of their awareness and exposure to more off label treatment options are more</tspan><tspan x="30" dy="13.5">comfortable with prescribing these options to their patients. They can be more general in their practice but usually have</tspan><tspan x="30" dy="13.5">more specialization into one type of cancer. They are very engaged in the oncology community and are seeing the benefits</tspan><tspan x="30" dy="13.5">of comprehensive genomic panels and are willing to order them more often. They also exhibit a more active interest in</tspan><tspan x="30" dy="13.5">cancer research and the science behind precision medicine and this interest is often what drew them to oncology in the</tspan><tspan x="30" dy="13.5">first place.</tspan></text>
<line x1="52" y1="162" x2="52" y2="358" stroke="#AAAAAA" stroke-width="1.2"/><line x1="52" y1="162" x2="57" y2="162" stroke="#AAAAAA" stroke-width="1.2"/><line x1="52" y1="358" x2="57" y2="358" stroke="#AAAAAA" stroke-width="1.2"/>
<line x1="52" y1="396" x2="52" y2="542" stroke="#AAAAAA" stroke-width="1.2"/><line x1="52" y1="396" x2="57" y2="396" stroke="#AAAAAA" stroke-width="1.2"/><line x1="52" y1="542" x2="57" y2="542" stroke="#AAAAAA" stroke-width="1.2"/>
<line x1="52" y1="580" x2="52" y2="694" stroke="#AAAAAA" stroke-width="1.2"/><line x1="52" y1="580" x2="57" y2="580" stroke="#AAAAAA" stroke-width="1.2"/><line x1="52" y1="694" x2="57" y2="694" stroke="#AAAAAA" stroke-width="1.2"/>
<text x="38" y="260" font-size="9.5" fill="#AAAAAA" text-anchor="middle" font-family="Calibri,Arial,sans-serif" transform="rotate(-90 38 260)">Awareness</text>
<text x="38" y="469" font-size="9.5" fill="#AAAAAA" text-anchor="middle" font-family="Calibri,Arial,sans-serif" transform="rotate(-90 38 469)">Patient Constraints</text>
<text x="38" y="637" font-size="9.5" fill="#AAAAAA" text-anchor="middle" font-family="Calibri,Arial,sans-serif" transform="rotate(-90 38 637)">Site Constraints</text>
<rect x="58" y="158" width="556" height="204" rx="3" fill="#7DC8A0" fill-opacity="0.15" stroke="#7DC8A0" stroke-width="1.2"/>
<rect x="610" y="158" width="550" height="204" rx="3" fill="#7DC8A0"/><text x="622" y="174" font-size="10.5" font-weight="bold" fill="#0D2E1E" font-family="Calibri,Arial,sans-serif">KEY DIFFERENTIATORS</text><text x="622" y="190.0" font-size="9.8" fill="#0D2E1E" font-family="Calibri,Arial,sans-serif">Moderates express higher awareness due to their tendency to specialize in a particular type</text><text x="622" y="204.0" font-size="9.8" fill="#0D2E1E" font-family="Calibri,Arial,sans-serif">of cancer, but mostly because of their involvement, either directly or indirectly to cancer</text><text x="622" y="218.0" font-size="9.8" fill="#0D2E1E" font-family="Calibri,Arial,sans-serif">research and their engagement in the oncology community. They are much more collaborative in</text><text x="622" y="232.0" font-size="9.8" fill="#0D2E1E" font-family="Calibri,Arial,sans-serif">their decision making, frequently attending tumor boards, conferences and seeking input from</text><text x="622" y="246.0" font-size="9.8" fill="#0D2E1E" font-family="Calibri,Arial,sans-serif">others.</text><text x="622" y="266.0" font-size="9.8" fill="#0D2E1E" font-family="Calibri,Arial,sans-serif">While they are also exposed to more cutting edge information, they are still overwhelmed with</text><text x="622" y="280.0" font-size="9.8" fill="#0D2E1E" font-family="Calibri,Arial,sans-serif">the amount of information coming out, and still stick pretty closely with NCCN guidelines.</text><text x="622" y="294.0" font-size="9.8" fill="#0D2E1E" font-family="Calibri,Arial,sans-serif">Their community engagement is what has the most influence with their comfort level of off</text><text x="622" y="308.0" font-size="9.8" fill="#0D2E1E" font-family="Calibri,Arial,sans-serif">label treatments.</text>
<rect x="58" y="454" width="556" height="92" rx="3" fill="#7DC8A0" fill-opacity="0.15" stroke="#7DC8A0" stroke-width="1.2"/>
<rect x="610" y="454" width="550" height="92" rx="3" fill="#7DC8A0"/><text x="622" y="470" font-size="10.5" font-weight="bold" fill="#0D2E1E" font-family="Calibri,Arial,sans-serif">KEY DIFFERENTIATORS</text><text x="622" y="486.0" font-size="9.8" fill="#0D2E1E" font-family="Calibri,Arial,sans-serif">Moderates are more likely to look into off label treatments, and are seeing more</text><text x="622" y="500.0" font-size="9.8" fill="#0D2E1E" font-family="Calibri,Arial,sans-serif">opportunities to prescribe them – either directly after initial diagnosis but when faced with</text><text x="622" y="514.0" font-size="9.8" fill="#0D2E1E" font-family="Calibri,Arial,sans-serif">constraints, they use CGP as a back up plan to NCCN guidelines. For many Moderates, they are</text><text x="622" y="528.0" font-size="9.8" fill="#0D2E1E" font-family="Calibri,Arial,sans-serif">consistently ordering CGP for certain cancer types where they are seeing more success with</text><text x="622" y="542.0" font-size="9.8" fill="#0D2E1E" font-family="Calibri,Arial,sans-serif">precision medicine.</text>
<text font-size="11" fill="#444" font-family="Calibri,Arial,sans-serif"><tspan x="62" y="189.8">Variety of cancer</tspan><tspan x="62" dy="15.2">type in patient cases</tspan></text>
<text x="248" y="198" font-size="10" fill="#666" text-anchor="end" font-family="Calibri,Arial,sans-serif">Wide</text><text x="492" y="198" font-size="10" fill="#666" font-family="Calibri,Arial,sans-serif">Limited</text>
<rect x="252" y="191" width="235" height="6" rx="3" fill="#CCCCCC"/><circle cx="275.5" cy="194" r="4.2" fill="#4EAA78"/><circle cx="301.4" cy="194" r="4.2" fill="#4EAA78"/><circle cx="327.2" cy="194" r="4.2" fill="#4EAA78"/><circle cx="353.1" cy="194" r="4.2" fill="#4EAA78"/><circle cx="381.2" cy="194" r="4.2" fill="#4EAA78"/><circle cx="407.1" cy="194" r="4.2" fill="#4EAA78"/>
<text font-size="11" fill="#444" font-family="Calibri,Arial,sans-serif"><tspan x="62" y="258.8">Involvement in cancer</tspan><tspan x="62" dy="15.2">research</tspan></text>
<text x="248" y="267" font-size="10" fill="#666" text-anchor="end" font-family="Calibri,Arial,sans-serif">Light</text><text x="492" y="267" font-size="10" fill="#666" font-family="Calibri,Arial,sans-serif">Heavy</text>
<rect x="252" y="260" width="235" height="6" rx="3" fill="#CCCCCC"/><circle cx="393.0" cy="263" r="7.5" fill="#4EAA78"/>
<text font-size="11" fill="#444" font-family="Calibri,Arial,sans-serif"><tspan x="62" y="324.8">Engagement in</tspan><tspan x="62" dy="15.2">oncology community</tspan></text>
<text x="248" y="333" font-size="10" fill="#666" text-anchor="end" font-family="Calibri,Arial,sans-serif">Low</text><text x="492" y="333" font-size="10" fill="#666" font-family="Calibri,Arial,sans-serif">High</text>
<rect x="252" y="326" width="235" height="6" rx="3" fill="#CCCCCC"/><circle cx="374.2" cy="329" r="7.5" fill="#4EAA78"/>
<text font-size="11" fill="#444" font-family="Calibri,Arial,sans-serif"><tspan x="62" y="426.4">Cost sensitivity</tspan></text>
<text x="248" y="427" font-size="10" fill="#666" text-anchor="end" font-family="Calibri,Arial,sans-serif">Low</text><text x="492" y="427" font-size="10" fill="#666" font-family="Calibri,Arial,sans-serif">High</text>
<rect x="252" y="420" width="235" height="6" rx="3" fill="#CCCCCC"/><circle cx="350.7" cy="423" r="7.5" fill="#4EAA78"/>
<text font-size="11" fill="#444" font-family="Calibri,Arial,sans-serif"><tspan x="62" y="488.2">Perceived risk of off</tspan><tspan x="62" dy="15.2">label treatment to</tspan><tspan x="62" dy="15.2">patients</tspan></text>
<text x="248" y="504" font-size="10" fill="#666" text-anchor="end" font-family="Calibri,Arial,sans-serif">Low</text><text x="492" y="504" font-size="10" fill="#666" font-family="Calibri,Arial,sans-serif">High</text>
<rect x="252" y="497" width="235" height="6" rx="3" fill="#CCCCCC"/><circle cx="369.5" cy="500" r="7.5" fill="#4EAA78"/>
<text font-size="11" fill="#444" font-family="Calibri,Arial,sans-serif"><tspan x="62" y="609.4">Cost sensitivity</tspan></text>
<text x="248" y="610" font-size="10" fill="#666" text-anchor="end" font-family="Calibri,Arial,sans-serif">Low</text><text x="492" y="610" font-size="10" fill="#666" font-family="Calibri,Arial,sans-serif">High</text>
<rect x="252" y="603" width="235" height="6" rx="3" fill="#CCCCCC"/><circle cx="350.7" cy="606" r="7.5" fill="#4EAA78"/>
<text font-size="11" fill="#444" font-family="Calibri,Arial,sans-serif"><tspan x="62" y="670.4">Choice in vendor</tspan></text>
<text x="248" y="671" font-size="10" fill="#666" text-anchor="end" font-family="Calibri,Arial,sans-serif">Restricted</text><text x="492" y="671" font-size="10" fill="#666" font-family="Calibri,Arial,sans-serif">Full autonomy</text>
<rect x="252" y="664" width="235" height="6" rx="3" fill="#CCCCCC"/><circle cx="374.2" cy="667" r="7.5" fill="#4EAA78"/>
</svg>