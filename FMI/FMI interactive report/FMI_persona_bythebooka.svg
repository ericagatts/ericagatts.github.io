<svg viewBox="0 0 1180 800" xmlns="http://www.w3.org/2000/svg">
<rect width="1180" height="800" fill="white"/>
<text x="30" y="54" font-size="38" fill="#1E3A5F" font-style="italic" font-family="Georgia,serif" font-weight="bold">By the book</text>
<line x1="30" y1="68" x2="217" y2="68" stroke="#1E3A5F" stroke-width="2.5"/>
<text font-size="9.5" fill="#555" font-style="italic" font-family="Calibri,Arial,sans-serif"><tspan x="30" y="84">By the book oncologists are the most cautious of the oncologist types. They adhere very strongly to guidelines, are</tspan><tspan x="30" dy="13.5">usually late adopters of new treatments and prefer to stick with treatments that are “tried and true,” or at the very</tspan><tspan x="30" dy="13.5">least that are indicated. They don’t place a high value on comprehensive testing when making treatment decisions. They</tspan><tspan x="30" dy="13.5">find targeted genomic testing to be much more useful to them. Their reasoning is that the results of a comprehensive test</tspan><tspan x="30" dy="13.5">is too much information that they don’t need and they don’t have actionable options for treatment.</tspan></text>
<line x1="52" y1="162" x2="52" y2="358" stroke="#AAAAAA" stroke-width="1.2"/><line x1="52" y1="162" x2="57" y2="162" stroke="#AAAAAA" stroke-width="1.2"/><line x1="52" y1="358" x2="57" y2="358" stroke="#AAAAAA" stroke-width="1.2"/>
<line x1="52" y1="396" x2="52" y2="542" stroke="#AAAAAA" stroke-width="1.2"/><line x1="52" y1="396" x2="57" y2="396" stroke="#AAAAAA" stroke-width="1.2"/><line x1="52" y1="542" x2="57" y2="542" stroke="#AAAAAA" stroke-width="1.2"/>
<line x1="52" y1="580" x2="52" y2="694" stroke="#AAAAAA" stroke-width="1.2"/><line x1="52" y1="580" x2="57" y2="580" stroke="#AAAAAA" stroke-width="1.2"/><line x1="52" y1="694" x2="57" y2="694" stroke="#AAAAAA" stroke-width="1.2"/>
<text x="38" y="260" font-size="9.5" fill="#AAAAAA" text-anchor="middle" font-family="Calibri,Arial,sans-serif" transform="rotate(-90 38 260)">Awareness</text>
<text x="38" y="469" font-size="9.5" fill="#AAAAAA" text-anchor="middle" font-family="Calibri,Arial,sans-serif" transform="rotate(-90 38 469)">Patient Constraints</text>
<text x="38" y="637" font-size="9.5" fill="#AAAAAA" text-anchor="middle" font-family="Calibri,Arial,sans-serif" transform="rotate(-90 38 637)">Site Constraints</text>
<rect x="58" y="230" width="556" height="132" rx="3" fill="#5C8DB2" fill-opacity="0.15" stroke="#5C8DB2" stroke-width="1.2"/>
<rect x="610" y="230" width="550" height="132" rx="3" fill="#5C8DB2"/><text x="622" y="246" font-size="10.5" font-weight="bold" fill="#FFFFFF" font-family="Calibri,Arial,sans-serif">KEY DIFFERENTIATORS</text><text x="622" y="262.0" font-size="9.8" fill="#FFFFFF" font-family="Calibri,Arial,sans-serif">While they appreciate research, these oncologists don’t like to be directly or indirectly</text><text x="622" y="276.0" font-size="9.8" fill="#FFFFFF" font-family="Calibri,Arial,sans-serif">involved and prefer to spend their time engaging in clinical care. The main source of their</text><text x="622" y="290.0" font-size="9.8" fill="#FFFFFF" font-family="Calibri,Arial,sans-serif">information is from published findings and medical journals. They don’t join tumor boards or</text><text x="622" y="304.0" font-size="9.8" fill="#FFFFFF" font-family="Calibri,Arial,sans-serif">attend conferences on a regular basis and don’t collaborate cross functionally in their</text><text x="622" y="318.0" font-size="9.8" fill="#FFFFFF" font-family="Calibri,Arial,sans-serif">speciality with others for treatment input.</text>
<rect x="58" y="454" width="556" height="92" rx="3" fill="#5C8DB2" fill-opacity="0.15" stroke="#5C8DB2" stroke-width="1.2"/>
<rect x="610" y="454" width="550" height="92" rx="3" fill="#5C8DB2"/><text x="622" y="470" font-size="10.5" font-weight="bold" fill="#FFFFFF" font-family="Calibri,Arial,sans-serif">KEY DIFFERENTIATORS</text><text x="622" y="486.0" font-size="9.8" fill="#FFFFFF" font-family="Calibri,Arial,sans-serif">These oncologists are very averse to prescribing any treatments outside of NCCN guidelines.</text><text x="622" y="500.0" font-size="9.8" fill="#FFFFFF" font-family="Calibri,Arial,sans-serif">They are most familiar with the risks and benefits of these treatments for their patients and</text><text x="622" y="514.0" font-size="9.8" fill="#FFFFFF" font-family="Calibri,Arial,sans-serif">only start considering alternate treatments when they are running out of options. They like to</text><text x="622" y="528.0" font-size="9.8" fill="#FFFFFF" font-family="Calibri,Arial,sans-serif">use tried and true methods and are wary of treatments that they are unsure of or that are more</text><text x="622" y="542.0" font-size="9.8" fill="#FFFFFF" font-family="Calibri,Arial,sans-serif">aggressive.</text>
<text font-size="11" fill="#444" font-family="Calibri,Arial,sans-serif"><tspan x="62" y="189.8">Variety of cancer</tspan><tspan x="62" dy="15.2">type in patient cases</tspan></text>
<text x="248" y="198" font-size="10" fill="#666" text-anchor="end" font-family="Calibri,Arial,sans-serif">Wide</text><text x="492" y="198" font-size="10" fill="#666" font-family="Calibri,Arial,sans-serif">Limited</text>
<rect x="252" y="191" width="235" height="6" rx="3" fill="#CCCCCC"/><circle cx="273.1" cy="194" r="4.2" fill="#3D6EA0"/><circle cx="289.6" cy="194" r="4.2" fill="#3D6EA0"/><circle cx="303.7" cy="194" r="4.2" fill="#3D6EA0"/><circle cx="317.8" cy="194" r="4.2" fill="#3D6EA0"/><circle cx="331.9" cy="194" r="4.2" fill="#3D6EA0"/><circle cx="346.0" cy="194" r="4.2" fill="#3D6EA0"/>
<text font-size="11" fill="#444" font-family="Calibri,Arial,sans-serif"><tspan x="62" y="258.8">Involvement in cancer</tspan><tspan x="62" dy="15.2">research</tspan></text>
<text x="248" y="267" font-size="10" fill="#666" text-anchor="end" font-family="Calibri,Arial,sans-serif">Light</text><text x="492" y="267" font-size="10" fill="#666" font-family="Calibri,Arial,sans-serif">Heavy</text>
<rect x="252" y="260" width="235" height="6" rx="3" fill="#CCCCCC"/><circle cx="291.9" cy="263" r="7.5" fill="#3D6EA0"/>
<text font-size="11" fill="#444" font-family="Calibri,Arial,sans-serif"><tspan x="62" y="324.8">Engagement in</tspan><tspan x="62" dy="15.2">oncology community</tspan></text>
<text x="248" y="333" font-size="10" fill="#666" text-anchor="end" font-family="Calibri,Arial,sans-serif">Low</text><text x="492" y="333" font-size="10" fill="#666" font-family="Calibri,Arial,sans-serif">High</text>
<rect x="252" y="326" width="235" height="6" rx="3" fill="#CCCCCC"/><circle cx="291.9" cy="329" r="7.5" fill="#3D6EA0"/>
<text font-size="11" fill="#444" font-family="Calibri,Arial,sans-serif"><tspan x="62" y="426.4">Cost sensitivity</tspan></text>
<text x="248" y="427" font-size="10" fill="#666" text-anchor="end" font-family="Calibri,Arial,sans-serif">Low</text><text x="492" y="427" font-size="10" fill="#666" font-family="Calibri,Arial,sans-serif">High</text>
<rect x="252" y="420" width="235" height="6" rx="3" fill="#CCCCCC"/><circle cx="374.2" cy="423" r="7.5" fill="#3D6EA0"/>
<text font-size="11" fill="#444" font-family="Calibri,Arial,sans-serif"><tspan x="62" y="488.2">Perceived risk of off</tspan><tspan x="62" dy="15.2">label treatment to</tspan><tspan x="62" dy="15.2">patients</tspan></text>
<text x="248" y="504" font-size="10" fill="#666" text-anchor="end" font-family="Calibri,Arial,sans-serif">Low</text><text x="492" y="504" font-size="10" fill="#666" font-family="Calibri,Arial,sans-serif">High</text>
<rect x="252" y="497" width="235" height="6" rx="3" fill="#CCCCCC"/><circle cx="433.0" cy="500" r="7.5" fill="#3D6EA0"/>
<text font-size="11" fill="#444" font-family="Calibri,Arial,sans-serif"><tspan x="62" y="609.4">Cost sensitivity</tspan></text>
<text x="248" y="610" font-size="10" fill="#666" text-anchor="end" font-family="Calibri,Arial,sans-serif">Low</text><text x="492" y="610" font-size="10" fill="#666" font-family="Calibri,Arial,sans-serif">High</text>
<rect x="252" y="603" width="235" height="6" rx="3" fill="#CCCCCC"/><circle cx="374.2" cy="606" r="7.5" fill="#3D6EA0"/>
<text font-size="11" fill="#444" font-family="Calibri,Arial,sans-serif"><tspan x="62" y="670.4">Choice in vendor</tspan></text>
<text x="248" y="671" font-size="10" fill="#666" text-anchor="end" font-family="Calibri,Arial,sans-serif">Restricted</text><text x="492" y="671" font-size="10" fill="#666" font-family="Calibri,Arial,sans-serif">Full autonomy</text>
<rect x="252" y="664" width="235" height="6" rx="3" fill="#CCCCCC"/><circle cx="374.2" cy="667" r="7.5" fill="#3D6EA0"/>
</svg>